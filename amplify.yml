version: 1

backend:
  phases:
    build:
      commands:
        - corepack enable
        - corepack prepare pnpm@10.7.1 --activate
        - pnpm install --frozen-lockfile
        - |
          if [ "$AWS_BRANCH" = "main" ]; then
            echo "Deploying backend for main branch..."
            pnpm exec ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
          else
            echo "Skipping backend deploy. Generating outputs from main backend..."
            pnpm exec ampx generate outputs --branch main --app-id $AWS_APP_ID
          fi

frontend:
  phases:
    build:
      commands:
        - pnpm run build

  artifacts:
    baseDirectory: dist
    files:
      - "**/*"

  cache:
    paths:
      - node_modules/**/*
