version: 1

backend:
  phases:
    build:
      commands:
        - corepack enable
        - corepack prepare pnpm@10.7.1 --activate
        - pnpm install --frozen-lockfile
        - |
          if [ "$AWS_BRANCH" = "main" ]; then
            echo "Deploying backend for production..."
            pnpm exec ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
          else
            echo "Deploying backend for $AWS_BRANCH..."
            pnpm exec ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
          fi

frontend:
  phases:
    build:
      commands:
        - pnpm run build

  artifacts:
    baseDirectory: dist
    files:
      - "**/*"

  # cache:
  #   paths:
  #     - node_modules/**/*
